<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Etsy Crawler</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <img src="icons/offorest-icon48.png" alt="" />
          <h1>Etsy Crawler</h1>
        </div>
        <span id="statusPill" class="pill">Idle</span>
      </header>

      <label>
        Keyword
        <input id="keywordInput" type="text" value="Ornament 2D" autocomplete="off" />
      </label>

      <label>
        Số trang
        <input id="pageInput" type="number" min="1" max="20" value="1" />
      </label>

      <div class="actions">
        <button id="startBtn">Start</button>
        <button id="refreshBtn" class="secondary">Refresh</button>
      </div>

      <section class="summary">
        <div>
          <span>Request ID</span>
          <strong id="requestIdText">-</strong>
        </div>
        <div>
          <span>Pages</span>
          <strong id="pagesText">0</strong>
        </div>
        <div>
          <span>Products</span>
          <strong id="productsText">0</strong>
        </div>
      </section>

      <div class="actions">
        <button id="copyBtn" class="secondary">Copy JSON</button>
        <button id="downloadBtn" class="secondary">Download etsy_output.json</button>
      </div>

      <pre id="resultBox">{}</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
