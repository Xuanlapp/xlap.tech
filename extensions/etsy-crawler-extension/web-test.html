<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Etsy Extension Web Test</title>
    <style>
      body {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
        font: 14px/1.45 Arial, sans-serif;
        color: #202124;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
        font-weight: 700;
      }

      input {
        height: 36px;
        padding: 0 10px;
      }

      button {
        height: 36px;
        padding: 0 14px;
        margin-right: 8px;
      }

      pre {
        min-height: 280px;
        overflow: auto;
        padding: 12px;
        background: #f6f7f9;
        border: 1px solid #d0d7de;
      }
    </style>
  </head>
  <body>
    <h1>Etsy Extension Web Test</h1>

    <label>
      Extension ID
      <input id="extensionId" placeholder="Paste extension id tu chrome://extensions" />
    </label>

    <label>
      Keyword
      <input id="keyword" value="Ornament 2D" />
    </label>

    <label>
      So trang
      <input id="maxPageNum" type="number" min="1" value="1" />
    </label>

    <button id="startBtn">Start from Web</button>
    <button id="pollBtn">Poll Result</button>

    <pre id="output">{}</pre>

    <script>
      const extensionIdInput = document.getElementById("extensionId");
      const keywordInput = document.getElementById("keyword");
      const maxPageNumInput = document.getElementById("maxPageNum");
      const output = document.getElementById("output");
      let requestId = null;
      let timer = null;

      function show(data) {
        output.textContent = JSON.stringify(data, null, 2);
      }

      function send(message) {
        return new Promise((resolve) => {
          chrome.runtime.sendMessage(extensionIdInput.value.trim(), message, resolve);
        });
      }

      async function poll() {
        if (!requestId) return;
        const resp = await send({ type: "ETSY_GET_JOB", requestId });
        show(resp);

        const status = resp?.job?.status;
        if (status && !["running", "started"].includes(status)) {
          clearInterval(timer);
          timer = null;
        }
      }

      document.getElementById("startBtn").addEventListener("click", async () => {
        requestId = `web_${Date.now()}`;
        const resp = await send({
          type: "ETSY_CRAWL",
          requestId,
          keyword: keywordInput.value.trim(),
          maxPageNum: Number(maxPageNumInput.value || 1),
        });

        show(resp);
        clearInterval(timer);
        timer = setInterval(poll, 1500);
      });

      document.getElementById("pollBtn").addEventListener("click", poll);
    </script>
  </body>
</html>
